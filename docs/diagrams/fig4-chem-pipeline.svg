<svg xmlns="http://www.w3.org/2000/svg" width="640" height="360" font-family="Calibri, Segoe UI, sans-serif">
  <defs>
    <marker id="a" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#2e74b5"/>
    </marker>
  </defs>
  <rect x="1" y="1" width="638" height="358" fill="#ffffff" stroke="#ffffff"/>
  <text x="16" y="26" font-size="15" font-weight="bold" fill="#1f3864">Offline structure pipeline: input &#8594; 2D image (no network)</text>

  <!-- input -->
  <rect x="16" y="120" width="118" height="58" rx="6" fill="#dbe7f5" stroke="#1f3864"/>
  <text x="75" y="144" font-size="11" font-weight="bold" fill="#1f3864" text-anchor="middle">Input</text>
  <text x="75" y="162" font-size="9" fill="#333" text-anchor="middle">name / formula / SMILES</text>

  <!-- resolver -->
  <rect x="160" y="92" width="180" height="118" rx="6" fill="#eef4fb" stroke="#2e74b5"/>
  <text x="250" y="112" font-size="11" font-weight="bold" fill="#1f3864" text-anchor="middle">Resolution (offline)</text>
  <text x="172" y="134" font-size="9.5" fill="#333">1. name &#8594; SMILES (259 dict)</text>
  <text x="172" y="152" font-size="9.5" fill="#333">2. formula &#8594; SMILES (101 dict)</text>
  <text x="172" y="170" font-size="9.5" fill="#333">3. else: treat input as SMILES</text>
  <text x="172" y="192" font-size="8.5" font-style="italic" fill="#6b7280">resolves formula ambiguity to</text>
  <text x="172" y="203" font-size="8.5" font-style="italic" fill="#6b7280">the common compound</text>
  <line x1="134" y1="150" x2="158" y2="150" stroke="#2e74b5" stroke-width="1.6" marker-end="url(#a)"/>

  <!-- OpenChemLib -->
  <rect x="366" y="92" width="150" height="118" rx="6" fill="#f3f9f3" stroke="#2e7d32"/>
  <text x="441" y="112" font-size="11" font-weight="bold" fill="#1b5e20" text-anchor="middle">OpenChemLib</text>
  <text x="378" y="134" font-size="9.5" fill="#333">fromSmiles()</text>
  <text x="378" y="152" font-size="9.5" fill="#333">inventCoordinates()</text>
  <text x="378" y="170" font-size="9.5" fill="#333">toSVG()</text>
  <text x="378" y="190" font-size="8.5" fill="#6b7280">+ canonical SMILES,</text>
  <text x="378" y="201" font-size="8.5" fill="#6b7280">ID-code, formula, MW</text>
  <line x1="340" y1="150" x2="364" y2="150" stroke="#2e74b5" stroke-width="1.6" marker-end="url(#a)"/>

  <!-- svg->png -->
  <rect x="366" y="240" width="150" height="64" rx="6" fill="#eef4fb" stroke="#2e74b5"/>
  <text x="441" y="262" font-size="10.5" font-weight="bold" fill="#1f3864" text-anchor="middle">svgToPngBase64()</text>
  <text x="441" y="278" font-size="8.5" fill="#333" text-anchor="middle">canvas, white background</text>
  <text x="441" y="291" font-size="8.5" fill="#333" text-anchor="middle">strip data-URL prefix</text>
  <line x1="441" y1="210" x2="441" y2="238" stroke="#2e74b5" stroke-width="1.6" marker-end="url(#a)"/>

  <!-- insert -->
  <rect x="542" y="240" width="86" height="64" rx="6" fill="#fff7e6" stroke="#b7791f"/>
  <text x="585" y="262" font-size="10" font-weight="bold" fill="#7a4f00" text-anchor="middle">Insert</text>
  <text x="585" y="278" font-size="8" fill="#7a4f00" text-anchor="middle">inline picture</text>
  <text x="585" y="290" font-size="8" fill="#7a4f00" text-anchor="middle">+ provenance</text>
  <line x1="516" y1="272" x2="540" y2="272" stroke="#2e74b5" stroke-width="1.6" marker-end="url(#a)"/>

  <!-- provenance note -->
  <rect x="16" y="240" width="330" height="64" rx="6" fill="#f6f8fa" stroke="#9cc3e5"/>
  <text x="28" y="260" font-size="10.5" font-weight="bold" fill="#1f4e79">Provenance embedded in image alt-text</text>
  <text x="28" y="277" font-size="9" fill="#333">"2D structure of aspirin &#8212; C9H8O4; MW 180.16;</text>
  <text x="28" y="290" font-size="9" fill="#333">SMILES ...; OCL-ID ..." &#8212; machine-readable in the .docx</text>

  <text x="16" y="332" font-size="10" fill="#6b7280">A parallel builder path turns a typed atom/bond DSL or pasted molfile into generic / Markush query structures via OpenChemLib query atoms.</text>
  <text x="16" y="349" font-size="10" fill="#6b7280">Every OpenChemLib call is individually guarded; dictionary SMILES are pre-validated in CI so no entry silently fails to render.</text>
</svg>
