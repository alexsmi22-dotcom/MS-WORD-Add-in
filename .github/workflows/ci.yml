name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Type-check
        run: npm run lint
      - name: Unit tests
        run: npm test
      - name: Validate compound dictionary
        run: npm run validate:compounds
      - name: Production build
        run: npm run build
      - name: Validate manifest
        run: npx office-addin-manifest validate manifest.xml
