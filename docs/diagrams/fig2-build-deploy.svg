<svg xmlns="http://www.w3.org/2000/svg" width="640" height="430" font-family="Calibri, Segoe UI, sans-serif">
  <defs>
    <marker id="a" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#2e74b5"/>
    </marker>
  </defs>
  <rect x="1" y="1" width="638" height="428" fill="#ffffff" stroke="#ffffff"/>
  <text x="16" y="26" font-size="15" font-weight="bold" fill="#1f3864">Build &amp; Deployment Pipeline</text>

  <!-- Row 1: source -> CI -> build -> dist -->
  <rect x="16" y="44" width="120" height="64" rx="6" fill="#eef4fb" stroke="#2e74b5"/>
  <text x="76" y="68" font-size="11" font-weight="bold" fill="#1f3864" text-anchor="middle">Source (TS)</text>
  <text x="76" y="84" font-size="9.5" fill="#333" text-anchor="middle">src/taskpane</text>
  <text x="76" y="97" font-size="9.5" fill="#333" text-anchor="middle">src/lib (+ OCL)</text>

  <line x1="136" y1="76" x2="172" y2="76" stroke="#2e74b5" stroke-width="1.6" marker-end="url(#a)"/>

  <rect x="174" y="44" width="140" height="64" rx="6" fill="#f3f9f3" stroke="#2e7d32"/>
  <text x="244" y="64" font-size="11" font-weight="bold" fill="#1b5e20" text-anchor="middle">CI gate (ci.yml)</text>
  <text x="244" y="80" font-size="9" fill="#333" text-anchor="middle">tsc &#8594; jest &#8594; validate</text>
  <text x="244" y="93" font-size="9" fill="#333" text-anchor="middle">compounds &#8594; build</text>
  <text x="244" y="104" font-size="9" fill="#333" text-anchor="middle">&#8594; manifest validate</text>

  <line x1="314" y1="76" x2="350" y2="76" stroke="#2e74b5" stroke-width="1.6" marker-end="url(#a)"/>

  <rect x="352" y="44" width="120" height="64" rx="6" fill="#eef4fb" stroke="#2e74b5"/>
  <text x="412" y="64" font-size="11" font-weight="bold" fill="#1f3864" text-anchor="middle">webpack</text>
  <text x="412" y="80" font-size="9.5" fill="#333" text-anchor="middle">2 entries &#8594;</text>
  <text x="412" y="94" font-size="9.5" fill="#333" text-anchor="middle">dist/</text>

  <line x1="472" y1="76" x2="508" y2="76" stroke="#2e74b5" stroke-width="1.6" marker-end="url(#a)"/>

  <rect x="510" y="44" width="116" height="64" rx="6" fill="#eef4fb" stroke="#2e74b5"/>
  <text x="568" y="64" font-size="10.5" font-weight="bold" fill="#1f3864" text-anchor="middle">dist/</text>
  <text x="568" y="79" font-size="8.5" fill="#333" text-anchor="middle">taskpane/commands</text>
  <text x="568" y="91" font-size="8.5" fill="#333" text-anchor="middle">.html/.js, assets,</text>
  <text x="568" y="103" font-size="8.5" fill="#333" text-anchor="middle">manifests</text>

  <!-- branch down to two paths -->
  <line x1="568" y1="108" x2="568" y2="140" stroke="#2e74b5" stroke-width="1.6"/>
  <line x1="120" y1="140" x2="616" y2="140" stroke="#2e74b5" stroke-width="1.6"/>
  <line x1="120" y1="140" x2="120" y2="168" stroke="#2e74b5" stroke-width="1.6" marker-end="url(#a)"/>
  <line x1="430" y1="140" x2="430" y2="168" stroke="#2e74b5" stroke-width="1.6" marker-end="url(#a)"/>

  <!-- Path A: hosting -->
  <rect x="20" y="170" width="290" height="100" rx="6" fill="#eaf0e9" stroke="#2e7d32"/>
  <text x="34" y="190" font-size="11.5" font-weight="bold" fill="#1b5e20">A &#183; Host the web files</text>
  <text x="34" y="210" font-size="10" fill="#333">pages.yml publishes dist/ to GitHub Pages</text>
  <text x="34" y="226" font-size="9.5" fill="#2e74b5">https://a-smith-caldwell.github.io/formula-inserter/</text>
  <text x="34" y="246" font-size="9.5" fill="#333">Push to main &#8594; auto rebuild &amp; republish.</text>
  <text x="34" y="261" font-size="9.5" fill="#333">Clients refresh on next pane open (no re-send).</text>

  <!-- Path B: manifest + install -->
  <rect x="330" y="170" width="296" height="100" rx="6" fill="#fff7e6" stroke="#b7791f"/>
  <text x="344" y="190" font-size="11.5" font-weight="bold" fill="#7a4f00">B &#183; Register per user (no admin)</text>
  <text x="344" y="210" font-size="9.5" fill="#333">package.ps1 stamps manifest.prod.xml host URL</text>
  <text x="344" y="226" font-size="9.5" fill="#333">install.ps1 &#8594; HKCU\...\WEF\Developer</text>
  <text x="344" y="242" font-size="9.5" fill="#333">value name + data = manifest path</text>
  <text x="344" y="261" font-size="9.5" fill="#333">Appears under Insert &#8594; Developer Add-ins</text>

  <!-- converge to Word -->
  <line x1="165" y1="270" x2="300" y2="300" stroke="#2e74b5" stroke-width="1.5" marker-end="url(#a)"/>
  <line x1="478" y1="270" x2="340" y2="300" stroke="#2e74b5" stroke-width="1.5" marker-end="url(#a)"/>

  <rect x="220" y="300" width="200" height="56" rx="6" fill="#dbe7f5" stroke="#1f3864" stroke-width="1.5"/>
  <text x="320" y="324" font-size="12" font-weight="bold" fill="#1f3864" text-anchor="middle">Word loads the add-in</text>
  <text x="320" y="343" font-size="9.5" fill="#333" text-anchor="middle">manifest points at hosted UI URL</text>

  <text x="16" y="386" font-size="10" fill="#6b7280">Alternative rollout: upload the same manifest to the Microsoft 365 admin center (Centralized Deployment) for org-wide install.</text>
  <text x="16" y="404" font-size="10" fill="#6b7280">Update model: web-only change = push to main; manifest change = bump &lt;Version&gt; (keep &lt;Id&gt; GUID), re-send.</text>
</svg>
