<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JurisLab — Tool detail</title>
  <meta name="description" content="Detailed capabilities and examples for a JurisLab Word add-in tool." />
  <style>
    :root { --blue:#2e74b5; --ink:#1b1b1f; --muted:#5b5b66; --bg:#f6f8fb; --card:#fff; --line:#e4e8ef; }
    * { box-sizing: border-box; }
    body { margin:0; font-family:-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif; color:var(--ink); background:var(--bg); line-height:1.6; }
    .wrap { max-width:820px; margin:0 auto; padding:0 20px; }
    header { background:linear-gradient(135deg,#2e74b5,#1f4e79); color:#fff; padding:40px 0 34px; }
    .back { display:inline-block; color:#fff; text-decoration:none; opacity:.9; font-size:.95rem; margin-bottom:18px; }
    .back:hover { opacity:1; text-decoration:underline; }
    h1 { font-size:2.1rem; margin:0 0 8px; }
    h1 .ic { margin-right:10px; }
    .tagline { font-size:1.12rem; opacity:.95; margin:0; max-width:660px; }
    section { padding:30px 0; }
    h2 { color:var(--blue); font-size:1.25rem; margin:0 0 14px; }
    ul.does { list-style:none; margin:0; padding:0; }
    ul.does li { background:var(--card); border:1px solid var(--line); border-left:3px solid var(--blue); border-radius:8px; padding:11px 15px; margin-bottom:9px; }
    ul.does li b { color:var(--ink); }
    .examples { background:var(--card); border:1px solid var(--line); border-radius:10px; padding:6px 18px 14px; }
    .ex { padding:12px 0; border-bottom:1px dashed var(--line); }
    .ex:last-child { border-bottom:none; }
    .ex .io { font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace; font-size:.92rem; }
    .ex .io .in { background:#eef1f6; padding:2px 7px; border-radius:5px; }
    .ex .io .arrow { color:var(--muted); margin:0 8px; }
    .ex .io .out { background:#e7f7ec; padding:2px 7px; border-radius:5px; }
    .ex .note { color:var(--muted); font-size:.95rem; margin-top:5px; }
    .note-box { background:#eef4fb; border:1px solid #d6e3f3; border-radius:10px; padding:14px 16px; color:#234; font-size:.95rem; }
    .nav { display:flex; justify-content:space-between; gap:12px; padding:10px 0 40px; }
    .nav a { background:var(--card); border:1px solid var(--line); border-radius:8px; padding:12px 16px; text-decoration:none; color:var(--blue); font-weight:600; flex:1; }
    .nav a:hover { border-color:var(--blue); }
    .nav a.next { text-align:right; }
    .nav a small { display:block; color:var(--muted); font-weight:400; font-size:.8rem; }
    footer { text-align:center; color:var(--muted); font-size:.9rem; padding:24px 0 44px; }
    a { color:var(--blue); }
    code { font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace; }
    .missing { padding:60px 0; text-align:center; }
  </style>
</head>

        "<b>Reverse complement</b> / complementary strand (IUPAC ambiguity accepted); <b>transcription</b> to mRNA.",
        "<b>Translation</b> in any of six frames; stop codons as *; degenerate codons resolved when unambiguous.",
        "<b>GC content &amp; base composition</b>; a <b>six-frame ORF finder</b> with a minimum-length filter and an insertable table.",
        "<b>Bench tools</b> — primer Tm (Wallace/GC%), protein MW/pI/GRAVY of the translation, restriction-site scan."
      ],
      examples:[
        {in:"ATGGCC…", out:"reverse complement, mRNA, protein, ORF table"},
        {in:"primer sequence", out:"Tm (Wallace and GC% methods)"}
      ] },
    reaction: { icon:"⚗️", title:"Reaction", tagline:"Compose multi-step reaction schemes with conditions over the arrow, drawn from names or SMILES.",
      does:[
        "reactants + reactants >> products, with optional conditions over/under the arrow.",
        "<b>Multi-step</b> schemes — A -> B -> C draws an arrow between each stage.",
        "Each component is a name or SMILES (formal charges kept); the scheme inserts as one image with provenance."
      ],
      examples:[
        {in:"benzene + HNO3 >> nitrobenzene ; H2SO4", out:"a reaction scheme with H₂SO₄ over the arrow"}
      ] },
    audit: { icon:"✅", title:"Audit", tagline:"One pass over the whole document runs every consistency check at once — a pre-filing sweep.",
      does:[
        "<b>Reference numerals</b> (uses your Numerals table), <b>SEQ ID NO</b> references vs. the listing, <b>figure-number</b> continuity, and <b>cross-reference validity</b>.",
        "Grouped report with a ✓ per clean area. Advisory — every check is heuristic; verify before filing."
      ],
      examples:[
        {note:"Reports: numerals ✓, figures ✓, but \"Fig. 5\" is referenced with no matching caption."}
      ] }
  };

  const ORDER = ["analyze","chemical","massspec","spectra","bioassay","peptide","stats","math","units","plot","tablechart","finance","build","code","sequence","botanical","numerals","refs","citations","dna","reaction","audit"];

  const params = new URLSearchParams(location.search);
  const id = params.get("tool");
  const t = TOOLS[id];
  const titleEl = document.getElementById("title");
  const tagEl = document.getElementById("tagline");
  const content = document.getElementById("content");
  const nav = document.getElementById("nav");

  if (!t) {
    titleEl.textContent = "Tool not found";
    tagEl.textContent = "";
    content.innerHTML = '<div class="missing"><p>That tool isn’t recognized. <a href="index.html">See all 22 tools →</a></p></div>';
  } else {
    document.title = t.title + " — JurisLab";
    titleEl.innerHTML = '<span class="ic">' + t.icon + "</span>" + t.title;
    tagEl.textContent = t.tagline;

    let html = "<section><h2>What it does</h2><ul class=\"does\">";
    for (const d of t.does) html += "<li>" + d + "</li>";
    html += "</ul></section>";

    html += "<section><h2>Examples</h2><div class=\"examples\">";
    for (const ex of t.examples) {
      html += '<div class="ex">';
      if (ex.in !== undefined) {
        html += '<div class="io"><span class="in"></span><span class="arrow">→</span><span class="out"></span></div>';
      }
      if (ex.note) html += '<div class="note">' + ex.note + "</div>";
      html += "</div>";
    }
    html += "</div></section>";

    html += '<section><div class="note-box"><strong>Private by design.</strong> This tool runs entirely on your machine — nothing you type leaves your computer. (The one exception across the whole add-in is the optional online name→structure lookup in Chemical mode, which prompts for consent before sending.)</div></section>';

    content.innerHTML = html;

    // Fill code text safely (textContent avoids any escaping surprises).
    const ios = content.querySelectorAll(".io");
    let k = 0;
    for (const ex of t.examples) {
      if (ex.in !== undefined) {
        const io = ios[k++];
        io.querySelector(".in").textContent = ex.in;
        io.querySelector(".out").innerHTML = ex.out; // out may contain <em> for names
      }
    }

    // prev / next
    const i = ORDER.indexOf(id);
    const prev = i > 0 ? ORDER[i - 1] : ORDER[ORDER.length - 1];
    const next = i < ORDER.length - 1 ? ORDER[i + 1] : ORDER[0];
    nav.innerHTML =
      '<a class="prev" href="tool.html?tool=' + prev + '"><small>← Previous</small>' + TOOLS[prev].icon + " " + TOOLS[prev].title + "</a>" +
      '<a class="next" href="tool.html?tool=' + next + '"><small>Next →</small>' + TOOLS[next].icon + " " + TOOLS[next].title + "</a>";
  }
  </script>
</body>
</html>
