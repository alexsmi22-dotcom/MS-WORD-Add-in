<svg xmlns="http://www.w3.org/2000/svg" width="640" height="380" font-family="Calibri, Segoe UI, sans-serif">
  <defs>
    <marker id="a" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#2e74b5"/>
    </marker>
    <marker id="ar" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#b00020"/>
    </marker>
  </defs>
  <rect x="1" y="1" width="638" height="378" fill="#ffffff" stroke="#ffffff"/>
  <text x="16" y="26" font-size="15" font-weight="bold" fill="#1f3864">Math: one parser, two emitters (single source of truth)</text>

  <!-- input -->
  <rect x="16" y="150" width="120" height="60" rx="6" fill="#dbe7f5" stroke="#1f3864"/>
  <text x="76" y="176" font-size="11" font-weight="bold" fill="#1f3864" text-anchor="middle">Input string</text>
  <text x="76" y="194" font-size="9" fill="#333" text-anchor="middle">"(-b+-sqrt(...))/2a"</text>

  <!-- parser -->
  <rect x="176" y="150" width="130" height="60" rx="6" fill="#eef4fb" stroke="#2e74b5"/>
  <text x="241" y="174" font-size="11" font-weight="bold" fill="#1f3864" text-anchor="middle">parseMathAst()</text>
  <text x="241" y="192" font-size="9" fill="#333" text-anchor="middle">tokenizer + RD parser</text>
  <line x1="136" y1="180" x2="174" y2="180" stroke="#2e74b5" stroke-width="1.6" marker-end="url(#a)"/>

  <!-- AST -->
  <rect x="346" y="150" width="96" height="60" rx="6" fill="#f3f9f3" stroke="#2e7d32"/>
  <text x="394" y="176" font-size="11" font-weight="bold" fill="#1b5e20" text-anchor="middle">Node AST</text>
  <text x="394" y="193" font-size="9" fill="#333" text-anchor="middle">tagged union</text>
  <line x1="306" y1="180" x2="344" y2="180" stroke="#2e74b5" stroke-width="1.6" marker-end="url(#a)"/>

  <!-- split to two emitters -->
  <line x1="442" y1="165" x2="486" y2="95" stroke="#2e74b5" stroke-width="1.6" marker-end="url(#a)"/>
  <line x1="442" y1="195" x2="486" y2="265" stroke="#2e74b5" stroke-width="1.6" marker-end="url(#a)"/>

  <!-- OMML emitter -->
  <rect x="488" y="62" width="140" height="64" rx="6" fill="#eef4fb" stroke="#2e74b5"/>
  <text x="558" y="84" font-size="10.5" font-weight="bold" fill="#1f3864" text-anchor="middle">emit() &#8594; OMML</text>
  <text x="558" y="100" font-size="8.5" fill="#333" text-anchor="middle">buildMathOoxml()</text>
  <text x="558" y="114" font-size="8.5" fill="#2e74b5" text-anchor="middle">&#8594; insertOoxml (real eqn)</text>

  <!-- HTML emitter -->
  <rect x="488" y="234" width="140" height="64" rx="6" fill="#eef4fb" stroke="#2e74b5"/>
  <text x="558" y="256" font-size="10.5" font-weight="bold" fill="#1f3864" text-anchor="middle">astToHtml() &#8594; HTML</text>
  <text x="558" y="272" font-size="8.5" fill="#333" text-anchor="middle">.m-frac/.m-nary CSS</text>
  <text x="558" y="286" font-size="8.5" fill="#2e74b5" text-anchor="middle">&#8594; live preview</text>

  <!-- fallback path -->
  <rect x="176" y="280" width="266" height="64" rx="6" fill="#fdecef" stroke="#b00020" stroke-dasharray="4 3"/>
  <text x="309" y="302" font-size="10.5" font-weight="bold" fill="#b00020" text-anchor="middle">Fallback (preview only)</text>
  <text x="309" y="319" font-size="9" fill="#333" text-anchor="middle">parser throws &#8594; parseMath() &#8594; segmentsToHtml()</text>
  <text x="309" y="333" font-size="9" fill="#333" text-anchor="middle">preview never blanks on partial input</text>
  <path d="M241,210 C241,250 250,265 250,280" fill="none" stroke="#b00020" stroke-width="1.4" stroke-dasharray="4 3" marker-end="url(#ar)"/>
  <path d="M442,312 C460,312 488,300 488,285" fill="none" stroke="#b00020" stroke-width="1.4" stroke-dasharray="4 3" marker-end="url(#ar)"/>

  <text x="16" y="368" font-size="10" fill="#6b7280">The same AST drives both the Word equation and its on-screen preview, so what the user sees is structurally identical to what is inserted.</text>
</svg>
